name: Deploy to cPanel via SSH (manual Production)

# Manual-only. Trigger via Actions UI → Run workflow (no prompts).
#
# cPanel layout (PROD_REMOTE_ROOT = document root, e.g. public_html):
#   /                     ← frontend/dist (index.html, assets/)
#   /api/                 ← backend/ (CodeIgniter — api/public/index.php)
#   /worker/              ← Playwright worker (not web-facing)
#   /samples/ /migrations/ /smoke-reports/
#
# Secrets (SSH): PROD_SSH_HOST, PROD_SSH_PORT, PROD_SSH_USER, PROD_REMOTE_ROOT, PROD_SSH_PRIVATE_KEY
# Secrets (app):  DB_HOST, DB_PORT, DB_DATABASE, DB_USERNAME, DB_PASSWORD,
#                  JWT_SECRET, SMOKE_VAULT_KEY, WORKER_SHARED_TOKEN
# Optional:        PROD_APP_BASE_URL, CORS_ALLOW_ORIGINS, VITE_API_BASE_URL, VITE_APP_NAME,
#                  OPENAI_API_KEY, GEMINI_API_KEY, PERPLEXITY_API_KEY
on:
  workflow_dispatch:

concurrency:
  group: cpanel-deploy
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PHP_VERSION: "8.2"

jobs:
  deploy:
    name: Deploy full stack to cPanel
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          missing=0
          if [ -z "${{ secrets.PROD_SSH_HOST }}" ]; then echo "::error::Missing repository secret: PROD_SSH_HOST"; missing=1; fi
          if [ -z "${{ secrets.PROD_SSH_PORT }}" ]; then echo "::error::Missing repository secret: PROD_SSH_PORT"; missing=1; fi
          if [ -z "${{ secrets.PROD_SSH_USER }}" ]; then echo "::error::Missing repository secret: PROD_SSH_USER"; missing=1; fi
          if [ -z "${{ secrets.PROD_SSH_PRIVATE_KEY }}" ]; then echo "::error::Missing repository secret: PROD_SSH_PRIVATE_KEY"; missing=1; fi
          if [ -z "${{ secrets.PROD_REMOTE_ROOT }}" ]; then echo "::error::Missing repository secret: PROD_REMOTE_ROOT"; missing=1; fi
          if [ -z "${{ secrets.DB_HOST }}" ]; then echo "::error::Missing repository secret: DB_HOST"; missing=1; fi
          if [ -z "${{ secrets.DB_DATABASE }}" ]; then echo "::error::Missing repository secret: DB_DATABASE"; missing=1; fi
          if [ -z "${{ secrets.DB_USERNAME }}" ]; then echo "::error::Missing repository secret: DB_USERNAME"; missing=1; fi
          if [ -z "${{ secrets.DB_PASSWORD }}" ]; then echo "::error::Missing repository secret: DB_PASSWORD"; missing=1; fi
          if [ -z "${{ secrets.JWT_SECRET }}" ]; then echo "::error::Missing repository secret: JWT_SECRET"; missing=1; fi
          if [ -z "${{ secrets.SMOKE_VAULT_KEY }}" ]; then echo "::error::Missing repository secret: SMOKE_VAULT_KEY"; missing=1; fi
          if [ -z "${{ secrets.WORKER_SHARED_TOKEN }}" ]; then echo "::error::Missing repository secret: WORKER_SHARED_TOKEN"; missing=1; fi
          if [ "$missing" -ne 0 ]; then exit 1; fi
          echo "All required deploy secrets are present."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, intl, curl, openssl
          tools: composer:v2

      - name: Install Node dependencies
        run: npm ci

      - name: Create frontend .env for production
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_APP_NAME: ${{ secrets.VITE_APP_NAME }}
        run: |
          printf 'VITE_API_BASE_URL=%s\nVITE_APP_NAME=%s\n' \
            "${VITE_API_BASE_URL:-/api/v1}" \
            "${VITE_APP_NAME:-AICountly Smoke}" \
            > .env

      - name: Build frontend
        run: npm run frontend:build

      - name: Prepare frontend for document root
        run: |
          cp deploy/public_html.htaccess frontend/dist/.htaccess
          cp frontend/dist/index.html frontend/dist/404.html

      - name: Build worker
        run: npm run worker:build

      - name: Install backend dependencies (production)
        working-directory: backend
        run: |
          composer config audit.block-insecure false
          composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.PROD_SSH_PORT }}" "${{ secrets.PROD_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          cat >> ~/.ssh/config <<EOF
          Host cpanel-prod
            HostName ${{ secrets.PROD_SSH_HOST }}
            Port ${{ secrets.PROD_SSH_PORT }}
            User ${{ secrets.PROD_SSH_USER }}
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
          EOF
          chmod 600 ~/.ssh/config

      - name: Ensure remote directories exist
        env:
          REMOTE_ROOT: ${{ secrets.PROD_REMOTE_ROOT }}
        run: |
          REMOTE_ROOT="${REMOTE_ROOT%/}"
          ssh cpanel-prod "mkdir -p \
            '${REMOTE_ROOT}/api' \
            '${REMOTE_ROOT}/worker' \
            '${REMOTE_ROOT}/samples' \
            '${REMOTE_ROOT}/smoke-reports' \
            '${REMOTE_ROOT}/migrations' \
            '${REMOTE_ROOT}/api/writable/cache' \
            '${REMOTE_ROOT}/api/writable/logs' \
            '${REMOTE_ROOT}/api/writable/session' \
            '${REMOTE_ROOT}/api/writable/uploads'"

      # backend → api/ (same pattern as aicountly-qa server-php → public_html/api/)
      - name: Rsync backend to api/
        env:
          REMOTE_ROOT: ${{ secrets.PROD_REMOTE_ROOT }}
        run: |
          REMOTE_ROOT="${REMOTE_ROOT%/}"
          rsync -avz --delete \
            --exclude '.env' \
            --exclude '.git/' \
            --exclude 'tests/' \
            --exclude 'writable/cache/*' \
            --exclude 'writable/logs/*' \
            --exclude 'writable/session/*' \
            --exclude 'writable/uploads/*' \
            --exclude 'writable/debugbar/*' \
            backend/ "cpanel-prod:${REMOTE_ROOT}/api/"

      - name: Write api production .env from secrets
        env:
          REMOTE_ROOT: ${{ secrets.PROD_REMOTE_ROOT }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SMOKE_VAULT_KEY: ${{ secrets.SMOKE_VAULT_KEY }}
          WORKER_SHARED_TOKEN: ${{ secrets.WORKER_SHARED_TOKEN }}
          PROD_APP_BASE_URL: ${{ secrets.PROD_APP_BASE_URL }}
          CORS_ALLOW_ORIGINS: ${{ secrets.CORS_ALLOW_ORIGINS }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          REMOTE_ROOT="${REMOTE_ROOT%/}"
          APP_BASE="${PROD_APP_BASE_URL:-https://smoke.aicountly.org/}"
          CORS="${CORS_ALLOW_ORIGINS:-https://smoke.aicountly.org}"
          {
            echo "CI_ENVIRONMENT=production"
            echo "app.baseURL=${APP_BASE}"
            echo "app.indexPage="
            echo ""
            echo "database.default.hostname=${DB_HOST}"
            echo "database.default.port=${DB_PORT:-5432}"
            echo "database.default.database=${DB_DATABASE}"
            echo "database.default.username=${DB_USERNAME}"
            echo "database.default.password=${DB_PASSWORD}"
            echo "database.default.DBDriver=Postgre"
            echo "database.default.DBPrefix="
            echo "database.default.charset=utf8"
            echo ""
            echo "JWT_SECRET=${JWT_SECRET}"
            echo "JWT_ACCESS_TTL=86400"
            echo "JWT_REFRESH_TTL=2592000"
            echo "JWT_ISSUER=smoke.aicountly.org"
            echo ""
            echo "SMOKE_VAULT_KEY=${SMOKE_VAULT_KEY}"
            echo "SMOKE_VAULT_KEY_VERSION=1"
            echo ""
            echo "WORKER_SHARED_TOKEN=${WORKER_SHARED_TOKEN}"
            echo "WORKER_BACKEND_URL=https://smoke.aicountly.org/api/v1"
            echo ""
            echo "REPORTS_DIR=../smoke-reports"
            echo "CORS_ALLOW_ORIGINS=${CORS}"
            echo ""
            echo "OPENAI_API_KEY=${OPENAI_API_KEY}"
            echo "GEMINI_API_KEY=${GEMINI_API_KEY}"
            echo "PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}"
          } > /tmp/smoke-api.env
          scp -i ~/.ssh/deploy_key -P "${{ secrets.PROD_SSH_PORT }}" /tmp/smoke-api.env \
            "cpanel-prod:${REMOTE_ROOT}/api/.env"
          ssh cpanel-prod "chmod 600 '${REMOTE_ROOT}/api/.env'"
          echo "Production .env written to ${REMOTE_ROOT}/api/.env"

      - name: Rsync worker
        env:
          REMOTE_ROOT: ${{ secrets.PROD_REMOTE_ROOT }}
        run: |
          REMOTE_ROOT="${REMOTE_ROOT%/}"
          rsync -avz --delete \
            worker/dist/ "cpanel-prod:${REMOTE_ROOT}/worker/dist/"
          rsync -avz \
            worker/package.json "cpanel-prod:${REMOTE_ROOT}/worker/package.json"

      - name: Rsync shared assets
        env:
          REMOTE_ROOT: ${{ secrets.PROD_REMOTE_ROOT }}
        run: |
          REMOTE_ROOT="${REMOTE_ROOT%/}"
          rsync -avz samples/ "cpanel-prod:${REMOTE_ROOT}/samples/"
          rsync -avz migrations/ "cpanel-prod:${REMOTE_ROOT}/migrations/"
          rsync -avz --exclude '*/' \
            smoke-reports/.gitkeep "cpanel-prod:${REMOTE_ROOT}/smoke-reports/" || true

      # frontend/dist → document root; preserve api/, worker/, etc.
      - name: Rsync frontend to document root
        env:
          REMOTE_ROOT: ${{ secrets.PROD_REMOTE_ROOT }}
        run: |
          REMOTE_ROOT="${REMOTE_ROOT%/}"
          rsync -avz --delete \
            --exclude 'api/' \
            --exclude 'worker/' \
            --exclude 'samples/' \
            --exclude 'smoke-reports/' \
            --exclude 'migrations/' \
            frontend/dist/ "cpanel-prod:${REMOTE_ROOT}/"

      - name: Remove obsolete deploy folders
        env:
          REMOTE_ROOT: ${{ secrets.PROD_REMOTE_ROOT }}
        run: |
          REMOTE_ROOT="${REMOTE_ROOT%/}"
          ssh cpanel-prod "rm -rf '${REMOTE_ROOT}/backend' '${REMOTE_ROOT}/frontend'"

      - name: Install worker production dependencies on server
        env:
          REMOTE_ROOT: ${{ secrets.PROD_REMOTE_ROOT }}
        run: |
          REMOTE_ROOT="${REMOTE_ROOT%/}"
          ssh cpanel-prod "cd '${REMOTE_ROOT}/worker' && \
            if command -v npm >/dev/null 2>&1; then \
              npm ci --omit=dev --ignore-scripts 2>/dev/null || npm install --omit=dev --ignore-scripts; \
            else \
              echo 'npm not found on server — install Node on cPanel or deploy worker from a VPS.'; \
            fi"

      - name: Run database migrations
        env:
          REMOTE_ROOT: ${{ secrets.PROD_REMOTE_ROOT }}
        run: |
          REMOTE_ROOT="${REMOTE_ROOT%/}"
          if ! ssh cpanel-prod "cd '${REMOTE_ROOT}/api' && php spark migrate --all --no-interaction"; then
            echo "::error::Migration failed — diagnostics:"
            ssh cpanel-prod "cd '${REMOTE_ROOT}/api' && (test -f .env && echo '.env: present' || echo '.env: MISSING') && php -m | grep -i pgsql || echo 'pgsql PHP extension: NOT loaded'"
            ssh cpanel-prod "ls -la '${REMOTE_ROOT}/api/writable/logs/' 2>/dev/null; tail -30 '${REMOTE_ROOT}/api/writable/logs/log-'*.log 2>/dev/null || true"
            exit 1
          fi

      - name: Run database seeders (first deploy only)
        env:
          REMOTE_ROOT: ${{ secrets.PROD_REMOTE_ROOT }}
        run: |
          REMOTE_ROOT="${REMOTE_ROOT%/}"
          MARKER="${REMOTE_ROOT}/api/writable/.smoke_seed_complete"
          if ssh cpanel-prod "test -f '${MARKER}'"; then
            echo "Seeders already applied — skipping."
            exit 0
          fi
          echo "First deploy — running InitialSeeder..."
          ssh cpanel-prod "cd '${REMOTE_ROOT}/api' && php spark db:seed InitialSeeder"
          ssh cpanel-prod "touch '${MARKER}' && chmod 644 '${MARKER}'"

      - name: Set backend writable permissions
        env:
          REMOTE_ROOT: ${{ secrets.PROD_REMOTE_ROOT }}
        run: |
          REMOTE_ROOT="${REMOTE_ROOT%/}"
          ssh cpanel-prod "chmod -R ug+rwx '${REMOTE_ROOT}/api/writable' || true"

      - name: Verify remote deploy
        env:
          REMOTE_ROOT: ${{ secrets.PROD_REMOTE_ROOT }}
        run: |
          REMOTE_ROOT="${REMOTE_ROOT%/}"
          ssh cpanel-prod "ls -la '${REMOTE_ROOT}/index.html' '${REMOTE_ROOT}/api/public/index.php'"

      - name: Deploy summary
        env:
          REMOTE_ROOT: ${{ secrets.PROD_REMOTE_ROOT }}
        run: |
          REMOTE_ROOT="${REMOTE_ROOT%/}"
          {
            echo "## cPanel production deploy"
            echo ""
            echo "| Path | Purpose |"
            echo "|---|---|"
            echo "| \`${REMOTE_ROOT}/\` | React portal (index.html) |"
            echo "| \`${REMOTE_ROOT}/api/\` | CodeIgniter API |"
            echo "| \`${REMOTE_ROOT}/worker/\` | Playwright worker |"
            echo ""
            echo "> Open https://smoke.aicountly.org/ — should show the login page, not a directory listing."
          } >> "$GITHUB_STEP_SUMMARY"

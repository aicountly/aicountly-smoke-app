name: Deploy to cPanel via SSH (manual Production)

# Manual-only. Trigger via Actions UI → Run workflow (no prompts).
# Always: full rsync (backend + frontend + worker + samples) then php spark migrate.
# Secrets: PROD_SSH_HOST, PROD_SSH_PORT, PROD_SSH_USER, PROD_REMOTE_ROOT, PROD_SSH_PRIVATE_KEY.
on:
  workflow_dispatch:

concurrency:
  group: cpanel-deploy
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PHP_VERSION: "8.2"
  PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
  PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
  PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
  PROD_REMOTE_ROOT: ${{ secrets.PROD_REMOTE_ROOT }}

jobs:
  deploy:
    name: Deploy full stack to cPanel
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          missing=0
          if [ -z "${{ secrets.PROD_SSH_HOST }}" ]; then echo "::error::Missing repository secret: PROD_SSH_HOST"; missing=1; fi
          if [ -z "${{ secrets.PROD_SSH_PORT }}" ]; then echo "::error::Missing repository secret: PROD_SSH_PORT"; missing=1; fi
          if [ -z "${{ secrets.PROD_SSH_USER }}" ]; then echo "::error::Missing repository secret: PROD_SSH_USER"; missing=1; fi
          if [ -z "${{ secrets.PROD_SSH_PRIVATE_KEY }}" ]; then echo "::error::Missing repository secret: PROD_SSH_PRIVATE_KEY"; missing=1; fi
          if [ -z "${{ secrets.PROD_REMOTE_ROOT }}" ]; then echo "::error::Missing repository secret: PROD_REMOTE_ROOT"; missing=1; fi
          if [ "$missing" -ne 0 ]; then exit 1; fi
          echo "All required deploy secrets are present."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, intl, curl, openssl
          tools: composer:v2

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend
        run: npm run frontend:build

      - name: Build worker
        run: npm run worker:build

      - name: Install backend dependencies (production)
        working-directory: backend
        run: |
          composer config audit.block-insecure false
          composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.PROD_SSH_PORT }}" "${{ secrets.PROD_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          cat >> ~/.ssh/config <<EOF
          Host cpanel-prod
            HostName ${{ secrets.PROD_SSH_HOST }}
            Port ${{ secrets.PROD_SSH_PORT }}
            User ${{ secrets.PROD_SSH_USER }}
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
          EOF
          chmod 600 ~/.ssh/config

      - name: Ensure remote directories exist
        env:
          REMOTE_ROOT: ${{ secrets.PROD_REMOTE_ROOT }}
        run: |
          ssh cpanel-prod "mkdir -p \
            '${REMOTE_ROOT}/backend' \
            '${REMOTE_ROOT}/frontend' \
            '${REMOTE_ROOT}/worker' \
            '${REMOTE_ROOT}/samples' \
            '${REMOTE_ROOT}/smoke-reports' \
            '${REMOTE_ROOT}/migrations' \
            '${REMOTE_ROOT}/backend/writable/cache' \
            '${REMOTE_ROOT}/backend/writable/logs' \
            '${REMOTE_ROOT}/backend/writable/session' \
            '${REMOTE_ROOT}/backend/writable/uploads'"

      - name: Rsync backend
        env:
          REMOTE_ROOT: ${{ secrets.PROD_REMOTE_ROOT }}
        run: |
          rsync -avz --delete \
            --exclude '.env' \
            --exclude '.git/' \
            --exclude 'tests/' \
            --exclude 'writable/cache/*' \
            --exclude 'writable/logs/*' \
            --exclude 'writable/session/*' \
            --exclude 'writable/uploads/*' \
            --exclude 'writable/debugbar/*' \
            backend/ "cpanel-prod:${REMOTE_ROOT}/backend/"

      - name: Rsync frontend
        env:
          REMOTE_ROOT: ${{ secrets.PROD_REMOTE_ROOT }}
        run: |
          rsync -avz --delete \
            frontend/dist/ "cpanel-prod:${REMOTE_ROOT}/frontend/"

      - name: Rsync worker
        env:
          REMOTE_ROOT: ${{ secrets.PROD_REMOTE_ROOT }}
        run: |
          rsync -avz --delete \
            worker/dist/ "cpanel-prod:${REMOTE_ROOT}/worker/dist/"
          rsync -avz \
            worker/package.json "cpanel-prod:${REMOTE_ROOT}/worker/package.json"

      - name: Rsync shared assets
        env:
          REMOTE_ROOT: ${{ secrets.PROD_REMOTE_ROOT }}
        run: |
          rsync -avz samples/ "cpanel-prod:${REMOTE_ROOT}/samples/"
          rsync -avz migrations/ "cpanel-prod:${REMOTE_ROOT}/migrations/"
          rsync -avz --exclude '*/' \
            smoke-reports/.gitkeep "cpanel-prod:${REMOTE_ROOT}/smoke-reports/" || true

      - name: Install worker production dependencies on server
        env:
          REMOTE_ROOT: ${{ secrets.PROD_REMOTE_ROOT }}
        run: |
          ssh cpanel-prod "cd '${REMOTE_ROOT}/worker' && \
            if command -v npm >/dev/null 2>&1; then \
              npm ci --omit=dev --ignore-scripts 2>/dev/null || npm install --omit=dev --ignore-scripts; \
            else \
              echo 'npm not found on server — install Node on cPanel or deploy worker from a VPS.'; \
            fi"

      - name: Run database migrations
        env:
          REMOTE_ROOT: ${{ secrets.PROD_REMOTE_ROOT }}
        run: |
          ssh cpanel-prod "cd '${REMOTE_ROOT}/backend' && php spark migrate --all --no-interaction"

      - name: Set backend writable permissions
        env:
          REMOTE_ROOT: ${{ secrets.PROD_REMOTE_ROOT }}
        run: |
          ssh cpanel-prod "chmod -R ug+rwx '${REMOTE_ROOT}/backend/writable' || true"

      - name: Deploy summary
        env:
          REMOTE_ROOT: ${{ secrets.PROD_REMOTE_ROOT }}
        run: |
          {
            echo "## cPanel production deploy"
            echo ""
            echo "Full stack rsync + migrations completed."
            echo ""
            echo "| Remote root | \`${REMOTE_ROOT}\` |"
            echo ""
            echo "> Verify the app on production."
          } >> "$GITHUB_STEP_SUMMARY"

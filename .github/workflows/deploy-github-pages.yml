name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create frontend .env from secrets
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_APP_NAME: ${{ secrets.VITE_APP_NAME }}
        run: |
          printf 'VITE_API_BASE_URL=%s\nVITE_APP_NAME=%s\n' \
            "${VITE_API_BASE_URL}" \
            "${VITE_APP_NAME:-AICountly Smoke}" \
            > .env

      - name: Build frontend for GitHub Pages
        run: npm run frontend:build
        env:
          GITHUB_PAGES: "true"
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: SPA fallback for GitHub Pages
        run: cp frontend/dist/index.html frontend/dist/404.html

      - name: Verify dist output
        run: |
          test -d frontend/dist || (echo "frontend/dist missing — build failed" && exit 1)
          ls -la frontend/dist/
          echo "Build artifact verified"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

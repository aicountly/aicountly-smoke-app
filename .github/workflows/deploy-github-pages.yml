name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; cancel queued workflow runs (not the CDN purge itself).
concurrency:
  group: github-pages
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create frontend .env from secrets
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_APP_NAME: ${{ secrets.VITE_APP_NAME }}
        run: |
          printf 'VITE_API_BASE_URL=%s\nVITE_APP_NAME=%s\n' \
            "${VITE_API_BASE_URL}" \
            "${VITE_APP_NAME:-AICountly Smoke}" \
            > .env

      - name: Build frontend for GitHub Pages
        run: npm run frontend:build
        env:
          GITHUB_PAGES: "true"
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: SPA fallback for GitHub Pages
        run: cp frontend/dist/index.html frontend/dist/404.html

      - name: Verify dist output
        run: |
          test -d frontend/dist || (echo "frontend/dist missing — build failed" && exit 1)
          ls -la frontend/dist/
          echo "Build artifact verified"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Cancel stuck GitHub Pages deployments
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ids=$(gh api "repos/${{ github.repository }}/pages/deployments" --paginate \
            -q '.[] | select(.status=="queued" or .status=="in_progress") | .id' || true)
          if [ -z "$ids" ]; then
            echo "No stuck Pages deployments."
            exit 0
          fi
          for id in $ids; do
            echo "Cancelling Pages deployment ${id}..."
            gh api --method POST "repos/${{ github.repository }}/pages/deployments/${id}/cancel" || true
          done
          echo "Waiting 15s for GitHub to release the deployment lock..."
          sleep 15

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000
          error_count: 30
          reporting_interval: 10000
